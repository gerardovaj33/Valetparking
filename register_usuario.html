<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="registro-main">


    <h1 class="registro-titulo">REGISTRO DE USUARIO Y VEHÍCULO</h1>


    <div class="registro-grid">

    
        <div class="registro-box">

            <h2>Registrar usuario</h2>

            <input class="input" placeholder="Subir INE" type="text">
            <input class="input" placeholder="Nombre" type="text">
            <input class="input" placeholder="Apellidos" type="text">
            <input class="input" placeholder="Correo" type="email">
            <input class="input" placeholder="Teléfono" type="tel">
            <input class="input" placeholder="Edad" type="number">

        </div>

  
        <div class="registro-img-box">
            <img src="img/vertical.jpg" class="registro-img">
        </div>

   
        <div class="registro-box">

            <h2>Registro de vehículo</h2>

            <input class="input" placeholder="Placa" type="text">
            <input class="input" placeholder="Color" type="text">
            <input class="input" placeholder="Lugar estacionado" type="text">
            <input class="input" placeholder="Modelo" type="text">
            <input class="input" placeholder="Hora de entrada" type="time">
            <input class="input" placeholder="Hora de salida" type="time">

        </div>

    </div>

    
    <div class="registro-btn-box">
        <a href="panel.html" class="btn-registro-final">
            GUARDAR Y SALIR
        </a>
    </div>

</div>

</body>

</html>
