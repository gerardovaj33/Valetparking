<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="register-contenedor">

    <h1 class="register-titulo">CREACIÓN DE CUENTA</h1>

    <div class="register-form">

        <input type="text" placeholder="Nombre" class="input">
        <input type="text" placeholder="Apellido" class="input">
        <input type="tel" placeholder="Teléfono" class="input">
        <input type="email" placeholder="Correo" class="input">
        <input type="password" placeholder="Contraseña" class="input">

        <label class="file-label">Subir licencia de conducir</label>
        <input type="file" class="file">


        <a href="login.html" class="btn-login-link">
            SIGUIENTE
        </a>

    </div>

</div>

</body>

</html>
